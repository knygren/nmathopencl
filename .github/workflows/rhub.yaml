# R-hub's generic GitHub Actions workflow file. It's canonical location is at
# https://github.com/r-hub/actions/blob/v1/workflows/rhub.yaml
# You can update this file to a newer version using the rhub2 package:
#
# rhub::rhub_setup()
#
# It is unlikely that you need to modify this file manually.

name: R-hub
run-name: "${{ github.event.inputs.id }}: ${{ github.event.inputs.name || format('Manually run by {0}', github.triggering_actor) }}"

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'A comma separated list of R-hub platforms to use.'
        type: string
        default: 'linux,windows,macos'
      name:
        description: 'Run name. You can leave this empty now.'
        type: string
      id:
        description: 'Unique ID. You can leave this empty now.'
        type: string

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
    # NO NEED TO CHECKOUT HERE
    - uses: r-hub/actions/setup@v1
      with:
        config: ${{ github.event.inputs.config }}
      id: rhub-setup

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: r-hub/actions/checkout@v1

      # Sanitizer tuning for ASan jobs (must be before setup-deps). Also set on run-check step
      # below — rhub/pkgbuild subprocesses do not always inherit GITHUB_ENV.
      # - TBB ODR: detect_odr_violation=0
      # - fontconfig/R leaks at vignette exit: detect_leaks=0 (LSAN exitcode=0 was not enough)
      # - TBB scheduler.cpp UBSan: halt_on_error=0 abort_on_error=0
      - name: ASan / UBSan env (clang-asan / gcc-asan)
        if: ${{ matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        run: |
          echo "ASAN_OPTIONS=detect_odr_violation=0:detect_leaks=0" >> "$GITHUB_ENV"
          echo "UBSAN_OPTIONS=halt_on_error=0:abort_on_error=0" >> "$GITHUB_ENV"

      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      # Workaround for: lazy-load fails loading RcppArmadillo.so — libquadmath.so.0 not found.
      # Intel platform uses a Fedora container; RcppArmadillo (via gfortran/quadmath) needs the
      # libquadmath runtime package on the image. Not a glmbayes R code issue.
      - name: Install libquadmath (Fedora / Intel container)
        if: ${{ matrix.config.label == 'intel' }}
        run: |
          set -eux
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y libquadmath
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y libquadmath
          else
            echo "Expected dnf or microdnf on this image" >&2
            exit 1
          fi

      # Workaround for: R_NamespaceRegistry in Rcpp/Function.h (R-devel vs Rcpp headers).
      # CRAN source Rcpp can still lag R-devel; GitHub Rcpp matches (same idea as Windows job).
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'valgrind' || matrix.config.label == 'nosuggests' || matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      # nosuggests: setup-deps does not install Suggests — prepend one lib via R_LIBS for source Rcpp
      # (R-devel). Do NOT set R_LIBS_USER to that path: it replaces the default user library and
      # hides packages setup-deps installed (e.g. rcmdcheck for run-check). Vignettes are skipped
      # on run-check (no knitr/rmarkdown); see BUILD_ARGS/CHECK_ARGS on that step.
      - name: Nosuggests — library path for Rcpp (source)
        if: ${{ matrix.config.label == 'nosuggests' }}
        env:
          RHUB_NS_LIB: ${{ format('{0}/rhub-nosuggests-lib', runner.temp) }}
        run: |
          set -eux
          mkdir -p "$RHUB_NS_LIB"
          echo "R_LIBS=$RHUB_NS_LIB" >> "$GITHUB_ENV"

      - name: Install Rcpp from CRAN (source) for R-devel (nosuggests)
        if: ${{ matrix.config.label == 'nosuggests' }}
        run: |
          Rscript -e 'lib <- Sys.getenv("R_LIBS"); stopifnot(nzchar(lib)); install.packages("Rcpp", lib = lib, repos = "https://cloud.r-project.org", type = "source")'

      # valgrind + ASan: R-devel needs headers from GitHub when CRAN Rcpp lags (R_NamespaceRegistry).
      - name: Install Rcpp from GitHub (valgrind / clang-asan / gcc-asan)
        if: ${{ matrix.config.label == 'valgrind' || matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Rscript -e "install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e 'lib <- .libPaths()[1L]; try(remove.packages("Rcpp", lib = lib), silent = TRUE); remotes::install_github("RcppCore/Rcpp", upgrade = "never", auth_token = Sys.getenv("GITHUB_TOKEN"))'

      # After GitHub Rcpp: lazy-load fails on RcppArmadillo.so — libflexiblas.so.3 (CRAN binary links FlexiBLAS).
      # Rebuild RcppArmadillo from source against R's BLAS (no FlexiBLAS runtime on image).
      - name: Rebuild RcppArmadillo from source (valgrind)
        if: ${{ matrix.config.label == 'valgrind' }}
        run: |
          Rscript -e "lib <- .libPaths()[1L]; if ('RcppArmadillo' %in% rownames(installed.packages(lib.loc=lib, noCache=TRUE))) remove.packages('RcppArmadillo', lib=lib); install.packages('RcppArmadillo', lib=lib, repos='https://cloud.r-project.org', type='source', Ncpus=2L)"

      # clang-asan / gcc-asan: use r-lib check-r-package directly — r-hub run-check adds a post-step
      # "Fail for UBSAN errors" that greps *.Rout for "runtime error:" / "SUMMARY: UndefinedBehaviorSanitizer:".
      # TBB/RcppParallel still prints those even when rcmdcheck exits OK, so the rhub step fails spuriously.
      # Args match r-hub/actions/run-check (empty CHECK_ARGS / BUILD_ARGS).
      - uses: r-lib/actions/check-r-package@v2
        if: ${{ matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        env:
          ASAN_OPTIONS: detect_odr_violation=0:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=0:abort_on_error=0
          R_KEEP_PKG_SOURCE: yes
        with:
          args: 'c("--no-manual", "--as-cran", "--install-args=--build", "--no-stop-on-test-error")'
          build_args: 'c("--no-manual")'
          upload-results: never
          upload-snapshots: false

      # nosuggests: must pass R_LIBS on the step (same path as prep); generic run-check does not inherit GITHUB_ENV reliably.
      # Skip vignettes: Suggests (e.g. rmarkdown) are not installed — same idea as ubuntu-next.
      - uses: r-hub/actions/run-check@v1
        if: ${{ matrix.config.label == 'nosuggests' }}
        env:
          R_LIBS: ${{ format('{0}/rhub-nosuggests-lib', runner.temp) }}
          BUILD_ARGS: --no-build-vignettes
          CHECK_ARGS: --no-build-vignettes --ignore-vignettes
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      - uses: r-hub/actions/run-check@v1
        if: ${{ matrix.config.label != 'clang-asan' && matrix.config.label != 'gcc-asan' && matrix.config.label != 'nosuggests' }}
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      # Workaround for: R_NamespaceRegistry (Windows R-devel vs CRAN Rcpp). setup-r sets R_LIBS_USER to
      # D:/a/_temp/Library — R CMD build resolves LinkingTo Rcpp to THAT path (-I.../Library/Rcpp/include).
      # Installing GitHub Rcpp under RUNNER_TEMP/rhub-windows-Rcpp was ignored; replace Rcpp in R_LIBS_USER.
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'windows' }}
        shell: bash
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      - name: Install Rcpp from GitHub (Windows R-devel)
        if: ${{ matrix.config.label == 'windows' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eux
          Rscript -e "install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e 'tok <- Sys.getenv("GITHUB_TOKEN"); ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; message("Replacing Rcpp in: ", ul); for (L in unique(c(ul, .libPaths()))) { ip <- tryCatch(rownames(installed.packages(lib.loc = L, noCache = TRUE)), error = function(e) character()); if ("Rcpp" %in% ip) try(remove.packages("Rcpp", lib = L), silent = TRUE) }; remotes::install_github("RcppCore/Rcpp", lib = ul, upgrade = "never", auth_token = tok, force = TRUE)'
          Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; p <- system.file("include/Rcpp/Function.h", package = "Rcpp", lib.loc = ul); cat("Rcpp Function.h:", p, "\n"); if (nzchar(p)) cat(any(grepl("R_NamespaceRegistry", readLines(p, warn = FALSE))), "\n")'

      - name: Export PKG_CPPFLAGS for Rcpp include (windows)
        if: ${{ matrix.config.label == 'windows' }}
        shell: bash
        run: |
          set -eux
          INC=$(Rscript -e "ul <- Sys.getenv('R_LIBS_USER'); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(gsub('\\\\', '/', normalizePath(system.file('include', package = 'Rcpp', lib.loc = ul), winslash = '/', mustWork = TRUE)))")
          echo "PKG_CPPFLAGS=-I${INC}" >> "$GITHUB_ENV"

      # ubuntu-next: CRAN rlang vs R-devel (SETLENGTH) breaks vignette rebuild. Skip building/checking
      # vignettes on this platform via BUILD_ARGS/CHECK_ARGS (r-hub run-check reads these — see r-hub/actions run-check action.yaml).
      # Re-enable when CRAN/GitHub rlang matches ubuntu-next R.
      # run-check: Windows uses PKG_CPPFLAGS from GitHub Rcpp in R_LIBS_USER; other platforms use defaults.
      - uses: r-hub/actions/run-check@v1
        if: ${{ matrix.config.label == 'windows' }}
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      - uses: r-hub/actions/run-check@v1
        if: ${{ matrix.config.label == 'ubuntu-next' }}
        env:
          BUILD_ARGS: --no-build-vignettes
          CHECK_ARGS: --no-build-vignettes --ignore-vignettes
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      - uses: r-hub/actions/run-check@v1
        if: ${{ matrix.config.label != 'windows' && matrix.config.label != 'ubuntu-next' }}
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log
