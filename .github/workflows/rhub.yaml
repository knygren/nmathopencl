# R-hub's generic GitHub Actions workflow file. It's canonical location is at
# https://github.com/r-hub/actions/blob/v1/workflows/rhub.yaml
# You can update this file to a newer version using the rhub2 package:
#
# rhub::rhub_setup()
#
# It is unlikely that you need to modify this file manually.

name: R-hub
run-name: "${{ github.event.inputs.id }}: ${{ github.event.inputs.name || format('Manually run by {0}', github.triggering_actor) }}"

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'A comma separated list of R-hub platforms to use.'
        type: string
        default: 'linux,windows,macos'
      name:
        description: 'Run name. You can leave this empty now.'
        type: string
      id:
        description: 'Unique ID. You can leave this empty now.'
        type: string

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
    # NO NEED TO CHECKOUT HERE
    - uses: r-hub/actions/setup@v1
      with:
        config: ${{ github.event.inputs.config }}
      id: rhub-setup

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: r-hub/actions/checkout@v1

      # Sanitizer tuning (must be before setup-deps). clang-ubsan uses ASan too; without
      # detect_odr_violation=0, RcppParallel/TBB can abort with ODR-violation during lazy-load.
      # clang21/clang22 use ASan-instrumented R: detect_leaks=0 avoids LSAN noise from sed/tar/etc.
      # Also set on check-r-package step — rhub/pkgbuild subprocesses do not always inherit GITHUB_ENV.
      - name: ASan / UBSan env (clang-asan / gcc-asan / clang-ubsan / clang21 / clang22)
        if: ${{ matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' || matrix.config.label == 'clang-ubsan' || matrix.config.label == 'clang21' || matrix.config.label == 'clang22' }}
        run: |
          echo "ASAN_OPTIONS=detect_odr_violation=0:detect_leaks=0" >> "$GITHUB_ENV"
          echo "UBSAN_OPTIONS=halt_on_error=0:abort_on_error=0" >> "$GITHUB_ENV"

      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      # c23/noremap can fail loading RcppParallel's TBB (`libtbb.so.2`) due to libc++ runtime symbol
      # mismatch. Use tinythread backend there to avoid loading TBB in namespace startup.
      - name: RcppParallel backend workaround (c23 / noremap)
        if: ${{ matrix.config.label == 'c23' || matrix.config.label == 'noremap' }}
        run: |
          echo "RCPP_PARALLEL_BACKEND=tinythread" >> "$GITHUB_ENV"

      # On c23/noremap, prebuilt RcppParallel+TBB can fail at namespace load with libc++/libstdc++
      # symbol mismatch (_ZNSt13exception_ptr...). Rebuild RcppParallel in tinythread mode.
      - name: Reinstall RcppParallel (tinythread, no TBB) for c23 / noremap
        if: ${{ matrix.config.label == 'c23' || matrix.config.label == 'noremap' }}
        run: |
          set -eux
          Rscript -e 'lib <- .libPaths()[1L]; if ("RcppParallel" %in% rownames(installed.packages(lib.loc = lib, noCache = TRUE))) remove.packages("RcppParallel", lib = lib); Sys.setenv(RCPP_PARALLEL_BACKEND = "tinythread", RCPP_PARALLEL_USE_TBB = "0"); install.packages("RcppParallel", lib = lib, repos = "https://cloud.r-project.org", type = "source", Ncpus = 2L); cat("RcppParallel backend env:", Sys.getenv("RCPP_PARALLEL_BACKEND"), "\n")'

      # Compare runner R to current CRAN release (via rversions). When R is not ahead of that release,
      # skip R-devel workarounds (GitHub Rcpp, ubuntu-next rlang rebuild, etc.).
      # Use a temp .R file (not multiline Rscript -e): Windows Git Bash + R-devel can segfault on -e.
      - name: R vs CRAN release (for workarounds)
        id: r-release
        run: |
          set -eux
          f="${GITHUB_WORKSPACE}/.rhub-r-release-detect.R"
          cat <<'RS' >"$f"
          gh <- Sys.getenv("GITHUB_OUTPUT")
          stopifnot(nzchar(gh))
          is_rchk <- grepl("rchk", Sys.getenv("R_LIB_FOR_PAK", ""), ignore.case = TRUE) ||
            grepl("rchk", R.home(), ignore.case = TRUE)
          rel <- if (!is_rchk) {
            lib_user <- Sys.getenv("R_LIBS_USER", "")
            if (!nzchar(lib_user)) lib_user <- .libPaths()[1L]
            dir.create(lib_user, showWarnings = FALSE, recursive = TRUE)
            if (!lib_user %in% .libPaths()) .libPaths(c(lib_user, .libPaths()))
            ok <- tryCatch({
              install.packages(
                "rversions",
                lib = lib_user,
                repos = "https://cloud.r-project.org",
                quiet = TRUE,
                type = "source",
                Ncpus = 1L,
                dependencies = TRUE
              )
              requireNamespace("rversions", quietly = TRUE)
            }, error = function(e) FALSE)
            if (ok) as.character(rversions::r_release()[["version"]][1]) else NA_character_
          } else {
            tryCatch({
              dcf <- read.dcf(url("https://cloud.r-project.org/src/base/VERSION-INFO.dcf"))
              as.character(dcf[1, "R"])
            }, error = function(e) NA_character_)
          }
          rv <- as.character(getRversion())
          ahead <- if (!is.na(rel) && nzchar(rel)) {
            getRversion() > package_version(rel)
          } else {
            FALSE
          }
          if (is.na(rel) || !nzchar(rel)) rel <- "unknown"
          cat(sprintf("cran_r_release=%s\n", rel), file = gh, append = TRUE)
          cat(sprintf("r_ahead_of_release=%s\n", if (ahead) "true" else "false"), file = gh, append = TRUE)
          message(
            "R version=", rv, " | CRAN release=", rel,
            " | r_ahead_of_release=", ahead
          )
          RS
          Rscript "$f"
          rm -f "$f"

      # ubuntu-next: CRAN *binary* rlang.so can reference SETLENGTH while R-patched/RC no longer exposes it;
      # library(testthat) → rlang then fails. Only when R is ahead of current CRAN release (same class of drift).
      - name: Reinstall rlang from source (ubuntu-next — testthat / SETLENGTH)
        if: ${{ matrix.config.label == 'ubuntu-next' && steps.r-release.outputs.r_ahead_of_release == 'true' }}
        run: |
          set -eux
          Rscript -e 'lib <- .libPaths()[1L]; try(remove.packages("rlang", lib = lib), silent = TRUE); install.packages("rlang", lib = lib, repos = "https://cloud.r-project.org", type = "source", Ncpus = 2L)'

      # Workaround for: lazy-load fails loading RcppArmadillo.so — libquadmath.so.0 not found.
      # Intel platform uses a Fedora container; RcppArmadillo (via gfortran/quadmath) needs the
      # libquadmath runtime package on the image. Not a glmbayes R code issue.
      - name: Install libquadmath (Fedora / Intel container)
        if: ${{ matrix.config.label == 'intel' }}
        run: |
          set -eux
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y libquadmath
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y libquadmath
          else
            echo "Expected dnf or microdnf on this image" >&2
            exit 1
          fi

      # When R is ahead of CRAN release, R-devel headers need GitHub Rcpp (R_NamespaceRegistry / Function.h).
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'valgrind' || matrix.config.label == 'nosuggests' || matrix.config.label == 'clang-asan' || matrix.config.label == 'gcc-asan' }}
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      # nosuggests: setup-deps does not install Suggests — prepend one lib via R_LIBS for Rcpp.
      # Do NOT set R_LIBS_USER to that path: it replaces the default user library and hides packages
      # setup-deps installed (e.g. rcmdcheck for run-check). Vignettes are skipped on run-check.
      # BUILD_ARGS/CHECK_ARGS must be in GITHUB_ENV: nested check-r-package reads Sys.getenv("BUILD_ARGS").
      - name: Skip vignettes (nosuggests) — BUILD_ARGS/CHECK_ARGS for rcmdcheck
        if: ${{ matrix.config.label == 'nosuggests' }}
        run: |
          echo "BUILD_ARGS=--no-build-vignettes" >> "$GITHUB_ENV"
          echo "CHECK_ARGS=--no-build-vignettes --ignore-vignettes" >> "$GITHUB_ENV"

      - name: Nosuggests — library path for Rcpp (source)
        if: ${{ matrix.config.label == 'nosuggests' }}
        env:
          RHUB_NS_LIB: ${{ format('{0}/rhub-nosuggests-lib', runner.temp) }}
        run: |
          set -eux
          mkdir -p "$RHUB_NS_LIB"
          echo "R_LIBS=$RHUB_NS_LIB" >> "$GITHUB_ENV"

      # nosuggests: R_LIBS is only the extra lib — Rcpp must live there. Use GitHub Rcpp when R is ahead
      # of CRAN release; otherwise CRAN source is enough.
      - name: Nosuggests — install Rcpp (GitHub if R ahead of CRAN release, else CRAN source)
        if: ${{ matrix.config.label == 'nosuggests' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          R_AHEAD_OF_RELEASE: ${{ steps.r-release.outputs.r_ahead_of_release }}
        run: |
          Rscript -e "lib <- Sys.getenv('R_LIBS'); stopifnot(nzchar(lib)); ahead <- identical(Sys.getenv('R_AHEAD_OF_RELEASE'), 'true'); if (ahead) { install.packages('remotes', repos='https://cloud.r-project.org'); try(remove.packages('Rcpp', lib=lib), silent=TRUE); remotes::install_github('RcppCore/Rcpp', lib=lib, upgrade='never', auth_token=Sys.getenv('GITHUB_TOKEN')) } else { install.packages('Rcpp', lib=lib, repos='https://cloud.r-project.org', type='source') }"

      # Skip ubuntu-next: CRAN Rcpp + rlang rebuild suffices there. Skip nosuggests: dedicated step above.
      # Skip clang21/clang22: ASan R + remotes/pkgbuild often breaks on install_github (tar/build-tools);
      # skip c23/noremap too: libc++ toolchain there can make RcppParallel/libtbb fail to load after
      # GitHub Rcpp reinstall (missing std::exception_ptr symbol). setup-deps CRAN Rcpp is safer there.
      # skip intel too: current devel-intel image cannot compile either GitHub or CRAN Rcpp headers
      # (R_BindingType_t / R_getRegisteredNamespace errors), so keep setup-deps Rcpp untouched.
      # Use R_LIBS_USER first (same as Windows): rhub setup-deps installs there; .libPaths()[1] can differ
      # (e.g. Intel/Fedora), so reinstalling only into [1] leaves no Rcpp visible to R CMD build.
      - name: Install Rcpp from GitHub (R ahead of CRAN release)
        if: ${{ steps.r-release.outputs.r_ahead_of_release == 'true' && matrix.config.label != 'ubuntu-next' && matrix.config.label != 'nosuggests' && matrix.config.label != 'clang21' && matrix.config.label != 'clang22' && matrix.config.label != 'c23' && matrix.config.label != 'noremap' && matrix.config.label != 'intel' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eux
          export TAR="${TAR:-/usr/bin/tar}"
          Rscript -e "install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e 'tok <- Sys.getenv("GITHUB_TOKEN"); ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; message("Installing Rcpp into: ", ul); for (L in unique(c(ul, .libPaths()))) { ip <- tryCatch(rownames(installed.packages(lib.loc = L, noCache = TRUE)), error = function(e) character()); if ("Rcpp" %in% ip) try(remove.packages("Rcpp", lib = L), silent = TRUE) }; if (dir.exists(file.path(ul, "Rcpp"))) unlink(file.path(ul, "Rcpp"), recursive = TRUE); gh_err <- NULL; github_ok <- FALSE; tryCatch({ remotes::install_github("RcppCore/Rcpp", lib = ul, ref = "master", upgrade = "always", auth_token = tok, force = TRUE) }, error = function(e) { gh_err <<- conditionMessage(e) }); ip_ul <- tryCatch(rownames(installed.packages(lib.loc = ul, noCache = TRUE)), error = function(e) character()); if ("Rcpp" %in% ip_ul) { d <- tryCatch(read.dcf(file.path(ul, "Rcpp", "DESCRIPTION")), error = function(e) NULL); if (!is.null(d) && nrow(d) > 0) github_ok <- isTRUE(tolower(d[1, "RemoteType"]) == "github") }; if (!github_ok) { message("GitHub Rcpp install not usable", if (!is.null(gh_err)) paste0(" (", gh_err, ")") else "", "; falling back to CRAN source Rcpp + Function.h patch"); install.packages("Rcpp", lib = ul, repos = "https://cloud.r-project.org", type = "source", Ncpus = 2L); fh <- file.path(ul, "Rcpp", "include", "Rcpp", "Function.h"); if (file.exists(fh)) { z <- readLines(fh, warn = FALSE); idx <- which(grepl("R_getVarEx", z, fixed = TRUE) & grepl("R_NamespaceRegistry", z, fixed = TRUE)); if (length(idx)) { i <- idx[[1L]]; indent <- sub("^([[:space:]]*).*", "\\1", z[i], perl = TRUE); z[i] <- paste0(indent, "Shield<SEXP> env(R_getRegisteredNamespace(ns.c_str()));"); writeLines(z, fh); message("Patched Rcpp Function.h after CRAN fallback: ", fh) } } }; ip_ul <- tryCatch(rownames(installed.packages(lib.loc = ul, noCache = TRUE)), error = function(e) character()); if (!("Rcpp" %in% ip_ul)) stop("Rcpp missing after install attempts in lib=", ul)'
          export GLMBAYES_RCPP_LIB="$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')"
          echo "GLMBAYES_RCPP_LIB=${GLMBAYES_RCPP_LIB}" >> "$GITHUB_ENV"

      # For labels where GitHub Rcpp reinstall is skipped, R-devel snapshots can still expose
      # Rcpp/Function.h's R_NamespaceRegistry branch at compile-time. Patch only when pattern exists.
      - name: Patch Rcpp Function.h (clang21 / clang22 / rchk)
        if: ${{ matrix.config.label == 'clang21' || matrix.config.label == 'clang22' || matrix.config.label == 'rchk' }}
        run: |
          set -eux
          export GLMBAYES_RCPP_LIB="${GLMBAYES_RCPP_LIB:-$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')}"
          echo "GLMBAYES_RCPP_LIB=${GLMBAYES_RCPP_LIB}" >> "$GITHUB_ENV"
          export GLMBAYES_PATCH_RCPP_FUNCTION_H=1
          Rscript tools/patch_rcpp_function_h.R

      # After GitHub Rcpp: lazy-load fails on RcppArmadillo.so — libflexiblas.so.3 (CRAN binary links FlexiBLAS).
      # Rebuild RcppArmadillo from source against R's BLAS (no FlexiBLAS runtime on image).
      - name: Rebuild RcppArmadillo from source (valgrind)
        if: ${{ matrix.config.label == 'valgrind' }}
        run: |
          Rscript -e "lib <- .libPaths()[1L]; if ('RcppArmadillo' %in% rownames(installed.packages(lib.loc=lib, noCache=TRUE))) remove.packages('RcppArmadillo', lib=lib); install.packages('RcppArmadillo', lib=lib, repos='https://cloud.r-project.org', type='source', Ncpus=2L)"

      # Valgrind: R CMD check can report Status: OK while Valgrind still logs "ERROR SUMMARY: N errors"
      # in *.Rout files. r-hub run-check then runs a separate "Fail for valgrind errors" step that
      # greps those lines — so the job fails even when rcmdcheck exits successfully. Pass R's own
      # memcheck suppressions (under R_HOME/share/valgrind/) via VALGRIND_OPTS; add package-specific
      # suppressions only after inspecting which .Rout file matches (see on-failure step below).
      - name: Valgrind — R memcheck suppressions (VALGRIND_OPTS)
        if: ${{ matrix.config.label == 'valgrind' }}
        run: |
          set -eux
          OPTS=$(Rscript -e 'd <- file.path(R.home("share"), "valgrind"); supp <- if (dir.exists(d)) list.files(d, pattern = "[.]supp$", full.names = TRUE) else character(); if (length(supp)) cat(paste(paste0("--suppressions=", supp), collapse = " "))')
          if [ -n "${OPTS:-}" ]; then
            echo "VALGRIND_OPTS=${OPTS}" >> "$GITHUB_ENV"
          fi

      - name: Debug selected check path
        run: |
          echo "matrix.config.label=${{ matrix.config.label }}"
          echo "v2_labels=clang-asan,gcc-asan,clang-ubsan,valgrind,nosuggests"
          echo "will_use_v2=${{ contains('clang-asan,gcc-asan,clang-ubsan,valgrind,nosuggests', matrix.config.label) }}"
          echo "will_use_rhub_v1=${{ !contains('clang-asan,gcc-asan,clang-ubsan,valgrind,nosuggests', matrix.config.label) }}"

      # clang-asan / gcc-asan / clang-ubsan / valgrind / nosuggests: use r-lib check-r-package directly to avoid
      # r-hub wrapper/post-step behavior and keep check args explicit per label.
      - uses: r-lib/actions/check-r-package@v2
        if: ${{ contains('clang-asan,gcc-asan,clang-ubsan,valgrind,nosuggests', matrix.config.label) }}
        env:
          ASAN_OPTIONS: detect_odr_violation=0:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=0:abort_on_error=0
          R_KEEP_PKG_SOURCE: yes
          R_LIBS: ${{ matrix.config.label == 'nosuggests' && format('{0}/rhub-nosuggests-lib', runner.temp) || '' }}
        with:
          args: ${{ matrix.config.label == 'valgrind' && 'c("--no-manual", "--as-cran", "--use-valgrind", "--install-args=--build", "--no-stop-on-test-error")' || matrix.config.label == 'nosuggests' && 'c("--no-manual", "--as-cran", "--install-args=--build", "--no-build-vignettes", "--ignore-vignettes", "--no-stop-on-test-error")' || 'c("--no-manual", "--as-cran", "--install-args=--build", "--no-stop-on-test-error")' }}
          build_args: ${{ matrix.config.label == 'nosuggests' && 'c("--no-manual", "--no-build-vignettes")' || 'c("--no-manual")' }}
          upload-results: never
          upload-snapshots: false

      - uses: r-hub/actions/run-check@v1
        if: ${{ !contains('clang-asan,gcc-asan,clang-ubsan,valgrind,nosuggests', matrix.config.label) }}
        env:
          ASAN_OPTIONS: ${{ (matrix.config.label == 'clang-ubsan' || matrix.config.label == 'clang21' || matrix.config.label == 'clang22') && 'detect_odr_violation=0:detect_leaks=0' || '' }}
          UBSAN_OPTIONS: ${{ (matrix.config.label == 'clang-ubsan' || matrix.config.label == 'clang21' || matrix.config.label == 'clang22') && 'halt_on_error=0:abort_on_error=0' || '' }}
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      - name: Valgrind — ERROR SUMMARY lines in check/*.Rout (on failure)
        if: ${{ failure() && matrix.config.label == 'valgrind' }}
        run: |
          set -x
          grep -R "ERROR SUMMARY" check/ 2>/dev/null | head -120 || true

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      - name: R vs CRAN release (for workarounds)
        id: r-release
        shell: bash
        run: |
          set -eux
          f="${GITHUB_WORKSPACE}/.rhub-r-release-detect.R"
          cat <<'RS' >"$f"
          gh <- Sys.getenv("GITHUB_OUTPUT")
          stopifnot(nzchar(gh))
          is_rchk <- grepl("rchk", Sys.getenv("R_LIB_FOR_PAK", ""), ignore.case = TRUE) ||
            grepl("rchk", R.home(), ignore.case = TRUE)
          rel <- if (!is_rchk) {
            lib_user <- Sys.getenv("R_LIBS_USER", "")
            if (!nzchar(lib_user)) lib_user <- .libPaths()[1L]
            dir.create(lib_user, showWarnings = FALSE, recursive = TRUE)
            if (!lib_user %in% .libPaths()) .libPaths(c(lib_user, .libPaths()))
            ok <- tryCatch({
              install.packages(
                "rversions",
                lib = lib_user,
                repos = "https://cloud.r-project.org",
                quiet = TRUE,
                type = "source",
                Ncpus = 1L,
                dependencies = TRUE
              )
              requireNamespace("rversions", quietly = TRUE)
            }, error = function(e) FALSE)
            if (ok) as.character(rversions::r_release()[["version"]][1]) else NA_character_
          } else {
            tryCatch({
              dcf <- read.dcf(url("https://cloud.r-project.org/src/base/VERSION-INFO.dcf"))
              as.character(dcf[1, "R"])
            }, error = function(e) NA_character_)
          }
          rv <- as.character(getRversion())
          ahead <- if (!is.na(rel) && nzchar(rel)) {
            getRversion() > package_version(rel)
          } else {
            FALSE
          }
          if (is.na(rel) || !nzchar(rel)) rel <- "unknown"
          cat(sprintf("cran_r_release=%s\n", rel), file = gh, append = TRUE)
          cat(sprintf("r_ahead_of_release=%s\n", if (ahead) "true" else "false"), file = gh, append = TRUE)
          message(
            "R version=", rv, " | CRAN release=", rel,
            " | r_ahead_of_release=", ahead
          )
          RS
          Rscript "$f"
          rm -f "$f"

      # macOS / Linux VM / m1-san: R-devel headers vs CRAN Rcpp (R_NamespaceRegistry). Windows uses
      # R_LIBS_USER + configure.win (step below). install_github into default library.
      # Remove Rcpp from every .libPaths() entry (same as Windows); set GLMBAYES_RCPP_LIB so
      # tools/rcpp_include.R cannot pick another CRAN tree when versions tie.
      - name: Install Rcpp from GitHub (macOS / Linux VM, R ahead of CRAN release)
        if: ${{ steps.r-release.outputs.r_ahead_of_release == 'true' && matrix.config.label != 'windows' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eux
          Rscript -e "install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e 'tok <- Sys.getenv("GITHUB_TOKEN"); ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; message("Installing Rcpp into: ", ul); for (L in unique(c(ul, .libPaths()))) { ip <- tryCatch(rownames(installed.packages(lib.loc = L, noCache = TRUE)), error = function(e) character()); if ("Rcpp" %in% ip) try(remove.packages("Rcpp", lib = L), silent = TRUE) }; if (dir.exists(file.path(ul, "Rcpp"))) unlink(file.path(ul, "Rcpp"), recursive = TRUE); remotes::install_github("RcppCore/Rcpp", lib = ul, ref = "master", upgrade = "always", auth_token = tok, force = TRUE)'
          export GLMBAYES_RCPP_LIB="$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')"
          echo "GLMBAYES_RCPP_LIB=${GLMBAYES_RCPP_LIB}" >> "$GITHUB_ENV"

      # When R is ahead of CRAN release: GitHub Rcpp + GLMBAYES_RCPP_LIB + rcmdcheck(install_deps=FALSE).
      - name: Diagnostics (R / Rcpp)
        if: ${{ matrix.config.label == 'windows' && steps.r-release.outputs.r_ahead_of_release == 'true' }}
        shell: bash
        run: |
          Rscript -e "cat('R:', R.version.string, '\n')"
          Rscript -e "if (requireNamespace('Rcpp', quietly=TRUE)) cat('Rcpp:', as.character(packageVersion('Rcpp')), '\n') else cat('Rcpp: <not installed>\\n')"

      # Rcpp: optional Function.h patch (opt-in: GLMBAYES_PATCH_RCPP_FUNCTION_H). Default OFF.
      - name: Install Rcpp from GitHub (Windows, R ahead of CRAN release)
        if: ${{ matrix.config.label == 'windows' && steps.r-release.outputs.r_ahead_of_release == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eux
          Rscript -e "install.packages('remotes', repos='https://cloud.r-project.org')"
          Rscript -e 'tok <- Sys.getenv("GITHUB_TOKEN"); ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; message("Installing Rcpp into: ", ul); for (L in unique(c(ul, .libPaths()))) { ip <- tryCatch(rownames(installed.packages(lib.loc = L, noCache = TRUE)), error = function(e) character()); if ("Rcpp" %in% ip) try(remove.packages("Rcpp", lib = L), silent = TRUE) }; if (dir.exists(file.path(ul, "Rcpp"))) unlink(file.path(ul, "Rcpp"), recursive = TRUE); remotes::install_github("RcppCore/Rcpp", lib = ul, ref = "master", upgrade = "always", auth_token = tok, force = TRUE)'
          # Same-step GITHUB_ENV is not visible to Rscript; export for patch + write for later steps.
          export GLMBAYES_RCPP_LIB="$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')"
          echo "GLMBAYES_RCPP_LIB=${GLMBAYES_RCPP_LIB}" >> "$GITHUB_ENV"
          # echo "GLMBAYES_PATCH_RCPP_FUNCTION_H=1" >> "$GITHUB_ENV"
          # export GLMBAYES_PATCH_RCPP_FUNCTION_H=1
          # Rscript tools/patch_rcpp_function_h.R
          Rscript -e 'p <- file.path(Sys.getenv("GLMBAYES_RCPP_LIB"), "Rcpp", "include", "Rcpp", "Function.h"); if (file.exists(p)) { h <- readLines(p, warn = FALSE); cat("Function.h still has R_getVarEx+Registry:", any(grepl("R_getVarEx.*R_NamespaceRegistry", h, perl = TRUE)), "\n") }'

      # ubuntu-next vignettes: handled in linux-containers job (ubuntu-next is a container image).
      # Windows: r-lib check-r-package (r-hub run-check nested rcmdcheck was fragile for env).
      # Rcpp headers: src/Makevars.win from configure.win + tools/rcpp_include.R (not PKG_CPPFLAGS in GITHUB_ENV).

      # R ahead of CRAN: rcmdcheck(install_deps=TRUE) reinstalls CRAN Rcpp and breaks the GitHub fix.
      - name: R-CMD-check (windows, install_deps=FALSE)
        if: ${{ matrix.config.label == 'windows' && steps.r-release.outputs.r_ahead_of_release == 'true' }}
        shell: bash
        env:
          R_KEEP_PKG_SOURCE: yes
        run: |
          set -eux
          export GLMBAYES_RCPP_LIB="${GLMBAYES_RCPP_LIB:-$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')}"
          # export GLMBAYES_PATCH_RCPP_FUNCTION_H=1
          # Rscript tools/patch_rcpp_function_h.R
          Rscript -e 'if (Sys.getenv("_R_CHECK_FORCE_SUGGESTS_", "") == "") Sys.setenv("_R_CHECK_FORCE_SUGGESTS_" = "false"); if (Sys.getenv("_R_CHECK_CRAN_INCOMING_", "") == "") Sys.setenv("_R_CHECK_CRAN_INCOMING_" = "false"); options(crayon.enabled = TRUE); f <- rcmdcheck::rcmdcheck; a <- list(args = c("--no-manual", "--as-cran", "--install-args=--build", "--no-stop-on-test-error"), build_args = c("--no-manual"), error_on = "warning", check_dir = "check"); if ("install_deps" %in% names(formals(f))) a$install_deps <- FALSE; do.call(f, a)'

      - name: R-CMD-check (macOS / Linux VM, install_deps=FALSE)
        if: ${{ steps.r-release.outputs.r_ahead_of_release == 'true' && matrix.config.label != 'windows' }}
        shell: bash
        env:
          R_KEEP_PKG_SOURCE: yes
        run: |
          set -eux
          export GLMBAYES_RCPP_LIB="${GLMBAYES_RCPP_LIB:-$(Rscript -e 'ul <- Sys.getenv("R_LIBS_USER"); if (!nzchar(ul)) ul <- .libPaths()[1L]; cat(ul)')}"
          Rscript -e 'if (Sys.getenv("_R_CHECK_FORCE_SUGGESTS_", "") == "") Sys.setenv("_R_CHECK_FORCE_SUGGESTS_" = "false"); if (Sys.getenv("_R_CHECK_CRAN_INCOMING_", "") == "") Sys.setenv("_R_CHECK_CRAN_INCOMING_" = "false"); options(crayon.enabled = TRUE); f <- rcmdcheck::rcmdcheck; a <- list(args = c("--no-manual", "--as-cran", "--install-args=--build", "--no-stop-on-test-error"), build_args = c("--no-manual"), error_on = "warning", check_dir = "check"); if ("install_deps" %in% names(formals(f))) a$install_deps <- FALSE; do.call(f, a)'

      - uses: r-hub/actions/run-check@v1
        if: ${{ steps.r-release.outputs.r_ahead_of_release != 'true' }}
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      # On install ERROR, R points to check/*/00install.out — upload so you can download from the Actions UI.
      - name: Upload R CMD check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rhub-check-${{ matrix.config.label }}
          if-no-files-found: warn
          path: |
            check/**/00install.out
            check/**/00check.log
